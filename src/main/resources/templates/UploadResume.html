<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历上传测试 - AI面试平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .file-upload-area {
            border: 3px dashed #d0d0d0;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }

        .file-upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .file-upload-area.dragover {
            border-color: #667eea;
            background: #e8edff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .upload-hint {
            color: #999;
            font-size: 12px;
        }

        input[type="file"] {
            display: none;
        }

        .file-info {
            margin-top: 15px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 8px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .file-size {
            color: #666;
            font-size: 13px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .result-content {
            font-size: 14px;
            line-height: 1.6;
        }

        .json-viewer {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            margin-top: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .copy-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-top: 10px;
        }

        .copy-btn:hover {
            background: #45a049;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            padding: 5px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: #666;
        }

        .mode-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .api-info {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #856404;
        }

        .api-info strong {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📄 简历上传测试</h1>
    <p class="subtitle">AI面试平台 - Resume Upload Test</p>

    <div class="api-info">
        <strong>📌 API端点配置</strong>
        默认: <code>http://localhost:8080</code> (可在下方修改)
    </div>

    <!-- 模式选择 -->
    <div class="mode-selector">
        <button class="mode-btn active" data-mode="parse">
            🤖 上传并解析
        </button>
        <button class="mode-btn" data-mode="upload">
            📤 仅上传文件
        </button>
    </div>

    <!-- 表单 -->
    <form id="uploadForm">
        <div class="form-group">
            <label for="apiBase">API基础地址</label>
            <input type="text" id="apiBase" value="http://localhost:8080" placeholder="http://localhost:8080">
        </div>

        <div class="form-group">
            <label for="userId">用户ID</label>
            <input type="number" id="userId" value="1" required placeholder="请输入用户ID">
        </div>

        <div class="form-group">
            <label>简历文件</label>
            <div class="file-upload-area" id="dropArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">点击选择文件或拖拽到此处</div>
                <div class="upload-hint">支持 PDF、Word、TXT 格式，最大 10MB</div>
            </div>
            <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt">

            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>
        </div>

        <div class="button-group">
            <button type="submit" class="btn-primary" id="uploadBtn">
                <span>🚀</span>
                <span id="btnText">开始上传</span>
            </button>
            <button type="button" class="btn-secondary" id="clearBtn">
                <span>🗑️</span>
                <span>清除</span>
            </button>
        </div>
    </form>

    <!-- 加载状态 -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div id="loadingText">正在上传并解析简历...</div>
    </div>

    <!-- 结果显示 -->
    <div class="result" id="result">
        <div class="result-title" id="resultTitle"></div>
        <div class="result-content" id="resultContent"></div>
        <div class="json-viewer" id="jsonViewer"></div>
        <button class="copy-btn" id="copyBtn" style="display:none;">📋 复制JSON</button>
    </div>
</div>

<script>
    // 全局变量
    let selectedFile = null;
    let currentMode = 'parse'; // 'parse' 或 'upload'

    // DOM元素
    const dropArea = document.getElementById('dropArea');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const uploadForm = document.getElementById('uploadForm');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    const clearBtn = document.getElementById('clearBtn');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const btnText = document.getElementById('btnText');
    const loadingText = document.getElementById('loadingText');

    // 模式切换
    modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            modeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.dataset.mode;

            if (currentMode === 'parse') {
                btnText.textContent = '上传并解析';
                loadingText.textContent = '正在上传并解析简历...';
            } else {
                btnText.textContent = '仅上传文件';
                loadingText.textContent = '正在上传文件...';
            }
        });
    });

    // 点击上传区域
    dropArea.addEventListener('click', () => {
        fileInput.click();
    });

    // 文件选择
    fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
    });

    // 拖拽事件
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => {
            dropArea.classList.add('dragover');
        }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => {
            dropArea.classList.remove('dragover');
        }, false);
    });

    dropArea.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        handleFiles(files);
    }, false);

    // 处理文件
    function handleFiles(files) {
        if (files.length === 0) return;

        const file = files[0];

        // 验证文件类型
        const allowedTypes = ['application/pdf', 'application/msword',
            'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
            'text/plain'];

        if (!allowedTypes.includes(file.type)) {
            showResult('error', '文件类型不支持', '请上传 PDF、Word 或 TXT 格式的文件');
            return;
        }

        // 验证文件大小 (10MB)
        if (file.size > 10 * 1024 * 1024) {
            showResult('error', '文件过大', '文件大小不能超过 10MB');
            return;
        }

        selectedFile = file;

        // 显示文件信息
        fileName.textContent = `📄 ${file.name}`;
        fileSize.textContent = `大小: ${formatFileSize(file.size)}`;
        fileInfo.classList.add('show');

        // 隐藏之前的结果
        result.classList.remove('show');
    }

    // 格式化文件大小
    function formatFileSize(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
    }

    // 表单提交
    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!selectedFile) {
            showResult('error', '请选择文件', '请先选择要上传的简历文件');
            return;
        }

        const userId = document.getElementById('userId').value;
        const apiBase = document.getElementById('apiBase').value.replace(/\/$/, '');

        if (!userId) {
            showResult('error', '参数错误', '请输入用户ID');
            return;
        }

        // 构建API URL
        const endpoint = currentMode === 'parse'
            ? `${apiBase}/users/${userId}/resume/upload`
            : `${apiBase}/users/${userId}/resume/upload-test`;

        // 显示加载状态
        loading.classList.add('show');
        result.classList.remove('show');
        document.getElementById('uploadBtn').disabled = true;

        // 创建FormData
        const formData = new FormData();
        formData.append('file', selectedFile);

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (response.ok && data.code === 200) {
                showResult('success', '✅ 上传成功', '', data.data);
            } else {
                showResult('error', '❌ 上传失败', data.message || '未知错误');
            }
        } catch (error) {
            showResult('error', '❌ 请求失败', `网络错误: ${error.message}`);
        } finally {
            loading.classList.remove('show');
            document.getElementById('uploadBtn').disabled = false;
        }
    });

    // 显示结果
    function showResult(type, title, message, data = null) {
        result.className = `result show ${type}`;
        document.getElementById('resultTitle').textContent = title;
        document.getElementById('resultContent').textContent = message;

        const jsonViewer = document.getElementById('jsonViewer');
        const copyBtn = document.getElementById('copyBtn');

        if (data) {
            jsonViewer.textContent = JSON.stringify(data, null, 2);
            jsonViewer.style.display = 'block';
            copyBtn.style.display = 'inline-block';
        } else {
            jsonViewer.style.display = 'none';
            copyBtn.style.display = 'none';
        }
    }

    // 复制JSON
    document.getElementById('copyBtn').addEventListener('click', () => {
        const jsonText = document.getElementById('jsonViewer').textContent;
        navigator.clipboard.writeText(jsonText).then(() => {
            const btn = document.getElementById('copyBtn');
            const originalText = btn.textContent;
            btn.textContent = '✅ 已复制';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 2000);
        });
    });

    // 清除按钮
    clearBtn.addEventListener('click', () => {
        selectedFile = null;
        fileInput.value = '';
        fileInfo.classList.remove('show');
        result.classList.remove('show');
    });
</script>
</body>
</html>
